role: Senior Scientist, Robotics & Autonomous Systems
bio: |
  I am currently leading a team in developing capabilities for quadruped robots. The focus is on using learning-based methods for perceptual locomotion and terrain-awareness, enabling legged robots to safely and robustly navigate both urban areas and unstructured outdoor environments. My research interests lie at the intersection of legged locomotion and reinforcement learning, with the goal of encouraging widespread adoption of robots in society.

